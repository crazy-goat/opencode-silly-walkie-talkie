services:
  webui:
    image: nginx:alpine
    ports:
      - "3001:443"
    volumes:
      - ./webui:/usr/share/nginx/html:ro
      - ./webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    command: sh -c "apk add --no-cache openssl && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl.key -out /etc/nginx/ssl.crt -subj '/CN=walkie-webui' && nginx -g 'daemon off;'"
