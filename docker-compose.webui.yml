services:
  webui:
    image: nginx:alpine
    ports:
      - "3000:443"
    volumes:
      - ./webui:/usr/share/nginx/html:ro
      - ./webui/nginx.conf:/etc/nginx/nginx-template.conf:ro
      - ${HOME}/.config/opencode/walkie-tls:/etc/walkie-tls:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/share/nginx/html/docker-entrypoint.sh"]
