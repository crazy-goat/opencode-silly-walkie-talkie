services:
  webui:
    image: nginx:alpine
    ports:
      - "3000:443"
    volumes:
      - ./webui:/usr/share/nginx/html:ro
      - ./webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOME}/.config/opencode/walkie-tls/cert.pem:/etc/nginx/ssl.crt:ro
      - ${HOME}/.config/opencode/walkie-tls/key.pem:/etc/nginx/ssl.key:ro
    restart: unless-stopped
    command: nginx -g 'daemon off;'
