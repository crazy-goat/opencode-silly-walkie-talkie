services:
  webui:
    image: nginx:alpine
    ports:
      - "3000:443"
    volumes:
      - ./webui:/usr/share/nginx/html:ro
      - ./webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOME}/.config/opencode/walkie-tls:/etc/walkie-tls:ro
    restart: unless-stopped
    command: >
      sh -c "
        if [ -f /etc/walkie-tls/cert.pem ] && [ -f /etc/walkie-tls/key.pem ]; then
          cp /etc/walkie-tls/cert.pem /etc/nginx/ssl.crt &&
          cp /etc/walkie-tls/key.pem /etc/nginx/ssl.key;
        else
          echo 'Plugin TLS keys not found, generating self-signed certificate...' &&
          apk add --no-cache openssl &&
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048
            -keyout /etc/nginx/ssl.key
            -out /etc/nginx/ssl.crt
            -subj '/CN=walkie-talkie-local';
        fi &&
        nginx -g 'daemon off;'
      "
