version: '3.8'

services:
  # Zrok Controller (API + Database)
  zrok-controller:
    image: openziti/zrok:latest
    command: controller
    environment:
      # API endpoint - gdzie zrok controller będzie dostępny
      - ZROK_API_ENDPOINT=${ZROK_API_ENDPOINT:-https://api.zrok.local}
      # Frontend wildcard domain - pod jaką domeną będą dostępne tunele
      - ZROK_FRONTEND_ENDPOINTS=${ZROK_FRONTEND_ENDPOINTS:-https://*.zrok.local}
      # Admin token do API controllera (zmień na bezpieczny!)
      - ZROK_ADMIN_TOKEN=${ZROK_ADMIN_TOKEN:-changeme}
      - ZROK_ENABLE_PUBLIC=true
      # Opcjonalnie: email dla Let's Encrypt
      - ZROK_ACME_EMAIL=${ZROK_ACME_EMAIL:-}
    volumes:
      - zrok-data:/var/lib/zrok
    ports:
      - "18080:18080"  # Controller API
    networks:
      - zrok-network
    restart: unless-stopped

  # Zrok Frontend (public facing)
  zrok-frontend:
    image: openziti/zrok:latest
    command: frontend
    environment:
      # Wewnętrzny endpoint do controllera
      - ZROK_API_ENDPOINT=http://zrok-controller:18080
      # Publiczny endpoint frontendu - pod jakim URL będą dostępne tunele
      - ZROK_FRONTEND_ENDPOINT=${ZROK_FRONTEND_ENDPOINT:-https://tunel.zrok.local}
      # Token do uwierzytelnienia (pobierz z controllera po pierwszym uruchomieniu)
      - ZROK_TOKEN=${ZROK_TOKEN}
    ports:
      - "8080:8080"  # Public HTTP
      # Jeśli masz certyfikaty SSL, odkomentuj:
      # - "443:443"    # Public HTTPS
    networks:
      - zrok-network
    depends_on:
      - zrok-controller
    restart: unless-stopped

  # Zrok Router (opcjonalnie - dla lepszej wydajności przy wielu użytkownikach)
  zrok-router:
    image: openziti/zrok:latest
    command: router
    environment:
      - ZROK_API_ENDPOINT=http://zrok-controller:18080
    networks:
      - zrok-network
    depends_on:
      - zrok-controller
    restart: unless-stopped

volumes:
  zrok-data:

networks:
  zrok-network:
    driver: bridge
