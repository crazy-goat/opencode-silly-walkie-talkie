<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session — Walkie-Talkie</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div id="app">
    <h1>Walkie-Talkie</h1>

      <button id="input-send">Send</button>
    </div>
  </div>
  <script src="src/ws-client.js"></script>
  <script src="src/sessions.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/session-app.js"></script>

</html>
